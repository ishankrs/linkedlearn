<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedLearn</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="4" fill="#0A66C2"/>
          <path d="M7 17V10h2v7H7zm1-8.5a1.25 1.25 0 110-2.5 1.25 1.25 0 010 2.5zM12 17v-3.87c0-1.04.02-2.37 1.44-2.37 1.44 0 1.66 1.13 1.66 2.3V17h2v-4.21c0-2.18-.47-3.86-3.02-3.86-1.22 0-2.04.67-2.38 1.31h-.03V10h-1.92v7H12z" fill="#fff"/>
        </svg>
        <h1>LinkedLearn</h1>
      </div>
      <p class="subtitle">One-click complete LinkedIn Learning courses</p>
    </header>

    <div id="view-loading" class="view active">
      <div class="spinner"></div>
      <p>Detecting course...</p>
    </div>

    <div id="view-error" class="view">
      <div class="error-icon">!</div>
      <p id="error-msg" class="error-text"></p>
      <button id="btn-retry" class="btn btn-secondary">Retry</button>
    </div>

    <div id="view-course" class="view">
      <div class="course-info">
        <div class="stat">
          <span class="stat-number" id="total-videos">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-number completed" id="completed-videos">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat">
          <span class="stat-number remaining" id="remaining-videos">0</span>
          <span class="stat-label">Left</span>
        </div>
      </div>

      <p class="estimate" id="estimate-text"></p>

      <div class="actions">
        <button id="btn-complete-remaining" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M13.485 1.929a.75.75 0 010 1.06l-7.07 7.072a.75.75 0 01-1.061 0L2.515 7.222a.75.75 0 011.06-1.06l2.132 2.131 6.54-6.54a.75.75 0 011.06 0h.178z"/>
          </svg>
          Complete Remaining
        </button>
        <button id="btn-complete-all" class="btn btn-secondary">
          Complete All (force re-mark)
        </button>
      </div>
    </div>

    <div id="view-progress" class="view">
      <div class="progress-header">
        <span id="progress-label">Completing videos...</span>
        <span id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p class="progress-current" id="progress-current"></p>
      <p class="progress-timer" id="progress-timer"></p>
      <div id="progress-errors" class="progress-errors"></div>
    </div>

    <div id="view-done" class="view">
      <div class="done-icon">&#10003;</div>
      <p class="done-text" id="done-text"></p>
      <button id="btn-reload" class="btn btn-primary">Reload Page</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
